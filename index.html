<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inducción SENA · Semana de recorrido</title>
    <meta
      name="description"
      content="Landing de inducción SENA construida desde archivos Markdown canónicos, con navegación tipo presentación por cada día de la semana."
    />
    <link rel="stylesheet" href="./assets/css/styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <div class="ambient-orb" aria-hidden="true"></div>

      <main class="viewport">
        <aside class="day-rail" aria-label="Ruta semanal por jornadas">
          <span class="day-rail__eyebrow">Jornadas</span>
          <nav class="day-nav" data-day-nav></nav>
        </aside>

        <section class="slides" data-slides-track>
          <article class="loading-state" data-loading>
            <strong>Cargando la semana de inducción...</strong>
            <p>Si abrís esto como sitio estático, los Markdown del proyecto se transforman en jornadas paginadas tipo deck, sin depender del scroll largo para navegar.</p>
          </article>
        </section>

        <section class="deck-dock" aria-label="Estado y navegación de la presentación" aria-live="polite">
          <div class="deck-dock__meta">
            <strong class="deck-dock__day" data-rail-current-label>Lunes</strong>
            <div class="deck-dock__labels">
              <strong class="deck-dock__title" data-current-label>Resumen</strong>
              <span class="status-copy">Jornada <strong data-current-day-progress>1/5</strong> · Página <strong data-current-page-progress>1/1</strong></span>
            </div>
          </div>

          <div class="deck-dock__status" aria-label="Estado de avance por la presentación">
            <div class="progress" aria-hidden="true">
              <div class="progress__bar" data-progress-bar></div>
            </div>
          </div>

          <div class="page-stepper" data-page-stepper aria-label="Páginas internas de la jornada activa"></div>

          <div class="deck-dock__actions" aria-label="Navegación secuencial">
            <button class="control-button control-button--inline" type="button" data-action="previous" aria-label="Página o jornada anterior">←</button>
            <button class="control-button control-button--inline" type="button" data-action="next" aria-label="Página o jornada siguiente">→</button>
          </div>
        </section>
      </main>

      <noscript>
        <div class="noscript">
          <strong>Necesitás JavaScript para la experiencia completa.</strong>
          <p>Sin JavaScript podés revisar directamente los archivos fuente:</p>
          <ul>
            <li><a href="./lunes.md">lunes.md</a></li>
            <li><a href="./martes.md">martes.md</a></li>
            <li><a href="./miercoles.md">miercoles.md</a></li>
            <li><a href="./jueves.md">jueves.md</a></li>
            <li><a href="./viernes.md">viernes.md</a></li>
          </ul>
        </div>
      </noscript>
    </div>

    <script type="module" src="./assets/js/content-loader.js"></script>
    <script type="module" src="./assets/js/presentation.js"></script>
  </body>
  </html>
